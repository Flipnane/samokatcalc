<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор стоимости</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator-card">
    <div class="header">
        <h2 id="lang-title">Расчет стоимости</h2>
        <div class="header-controls">
            <!-- Выбор языка -->
            <select id="langSelect" class="lang-select">
                <option value="ru">RU</option>
                <option value="en">EN</option>
                <option value="fr">FR</option>
                <option value="tr">TR</option>
                <option value="tg">TG</option>
                <option value="kk">KK</option>
                <option value="be">BE</option>
                <option value="ky">KY</option>
                <option value="uz">UZ</option>
                <option value="hy">HY</option>
            </select>
            <!-- Ползунок темы -->
            <label class="theme-switch" aria-label="Переключить тему">
                <input type="checkbox" id="themeToggle">
                <span class="slider">
                    <span class="icon sun">☀️</span>
                    <span class="icon moon">🌙</span>
                </span>
            </label>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" id="tabExact">Точный (стопы)</button>
        <button class="tab" id="tabApprox">Примерный (заказы)</button>
    </div>

    <form id="calcForm">
        <div class="input-group">
            <label for="hours" id="lang-hours-lbl">Количество часов (100 ₽/ч)</label>
            <input type="number" id="hours" min="0" step="any" placeholder="0" inputmode="decimal">
        </div>

        <!-- Режим 1: Стопы -->
        <div id="exactFields" class="fade-block">
            <div class="input-group">
                <label for="stops15" id="lang-stops15-lbl">Стопы 15 мин (50 ₽/шт)</label>
                <input type="number" id="stops15" min="0" value="0" inputmode="numeric">
            </div>
            <div class="input-group">
                <label for="stops30" id="lang-stops30-lbl">Стопы 30 мин (100 ₽/шт)</label>
                <input type="number" id="stops30" min="0" value="0" inputmode="numeric">
            </div>
        </div>

        <!-- Режим 2: Заказы -->
        <div id="approxFields" class="fade-block hidden">
            <div class="input-group">
                <label for="orders" id="lang-orders-lbl">Количество заказов (50 ₽/шт)</label>
                <input type="number" id="orders" min="0" value="0" inputmode="numeric">
            </div>
        </div>

        <label class="checkbox-group">
            <input type="checkbox" id="extraPay">
            <span id="lang-extrapay-lbl">Доплата (+10 ₽ за каждый стоп/заказ)</span>
        </label>

        <button type="button" class="btn-clear" id="clearBtn">Сбросить значения</button>
    </form>

    <div class="result-box">
        <div id="lang-result-lbl">Итоговая стоимость:</div>
        <div class="counter-container" id="counterContainer">
            <span class="currency-symbol">₽</span>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
